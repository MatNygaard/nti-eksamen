<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTI — Bestill 3D-skanning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #111827;
      -webkit-font-smoothing: antialiased;
      background-color: #F5F5F4;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="bg-white border-b border-[#E8E8E8]">
    <div class="max-w-[1100px] mx-auto px-8 py-4 flex items-center gap-2">
      <span class="text-[16px] font-extrabold text-[#0C0C0C]">nti</span>
      <span class="w-[5px] h-[5px] bg-[#E63312] rounded-sm inline-block"></span>
      <span class="text-[#E8E8E8] mx-1">|</span>
      <span class="text-[14px] font-medium text-[#6B6B6B]">Bestill 3D-skanning</span>
    </div>
  </div>

  <!-- Innhold -->
  <div class="max-w-[1100px] mx-auto px-8 py-10 flex gap-8 items-start">

    <!-- Venstre: Input -->
    <main class="flex-1 space-y-6">

      <!-- Prosjekttype -->
      <section class="bg-white border border-[#E8E8E8] rounded-lg p-6">
        <p class="text-[11px] font-semibold uppercase tracking-[0.1em] text-[#9B9B9B] mb-3">Prosjekttype</p>
        <div id="projectType" class="grid grid-cols-3 gap-2"></div>
      </section>

      <!-- Formål -->
      <section class="bg-white border border-[#E8E8E8] rounded-lg p-6">
        <p class="text-[11px] font-semibold uppercase tracking-[0.1em] text-[#9B9B9B] mb-3">Formål med skanningen</p>
        <div id="scanPurpose" class="grid grid-cols-2 gap-2"></div>
      </section>

      <!-- Omfang og lokasjon -->
      <section class="bg-white border border-[#E8E8E8] rounded-lg p-6">
        <p class="text-[11px] font-semibold uppercase tracking-[0.1em] text-[#9B9B9B] mb-3">Omfang og lokasjon</p>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[13px] font-medium text-[#3D3D3D] mb-1">Areal (m²)</label>
            <input id="areaM2" type="number" min="1" placeholder="F.eks. 2500"
              class="w-full border border-[#E8E8E8] rounded-md px-3 py-2 text-sm focus:outline-none focus:border-[#0C0C0C] focus:ring-1 focus:ring-[#0C0C0C]" />
          </div>
          <div>
            <label class="block text-[13px] font-medium text-[#3D3D3D] mb-1">Postnummer</label>
            <input id="postalCode" type="text" maxlength="4" placeholder="0000"
              class="w-full border border-[#E8E8E8] rounded-md px-3 py-2 text-sm focus:outline-none focus:border-[#0C0C0C] focus:ring-1 focus:ring-[#0C0C0C]" />
          </div>
        </div>
      </section>

      <!-- Leveranser -->
      <section class="bg-white border border-[#E8E8E8] rounded-lg p-6">
        <p class="text-[11px] font-semibold uppercase tracking-[0.1em] text-[#9B9B9B] mb-3">Leveranser</p>
        <div id="deliverables" class="flex flex-wrap gap-2"></div>
      </section>

      <!-- Presisjonsnivå -->
      <section class="bg-white border border-[#E8E8E8] rounded-lg p-6">
        <p class="text-[11px] font-semibold uppercase tracking-[0.1em] text-[#9B9B9B] mb-3">Presisjonsnivå</p>
        <div id="precisionLevel" class="grid grid-cols-2 gap-2"></div>
      </section>

    </main>

    <!-- Høyre: Estimat -->
    <aside class="w-80 shrink-0 sticky top-20">
      <div id="estimatePanel" class="bg-white border border-[#E8E8E8] rounded-lg p-6">
        <p class="text-[11px] font-semibold uppercase tracking-[0.1em] text-[#9B9B9B] mb-4">Estimert pris</p>
        <p class="text-[14px] text-[#9B9B9B] text-center py-6">Fyll inn areal for å se estimat.</p>
      </div>
    </aside>

  </div>

  <script src="script.js"></script>
</body>
</html>
