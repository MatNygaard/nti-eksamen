<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTI - Bestill 3D-skanning</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <main>
      <h1>NTI - Bestill 3D-skanning</h1>

      <section>
        <h2>Prosjekttype</h2>
        <div id="projectType" class="btn-group"></div>
      </section>

      <section>
        <h2>Formål med skanningen</h2>
        <div id="scanPurpose" class="btn-group"></div>
      </section>

      <section>
        <h2>Omfang og lokasjon</h2>
        <div class="input-row">
          <div>
            <label>Areal (m²)</label>
            <input id="areaM2" type="number" min="1" placeholder="F.eks. 2500" />
          </div>
          <div>
            <label>Postnummer</label>
            <input id="postalCode" type="text" maxlength="4" placeholder="0000" />
          </div>
        </div>
      </section>

      <section>
        <h2>Leveranser</h2>
        <div id="deliverables" class="btn-group"></div>
      </section>

      <section>
        <h2>Presisjonsnivå</h2>
        <div id="precisionLevel" class="btn-group"></div>
      </section>
    </main>

    <aside>
      <div id="estimatePanel" class="panel">
        <h2>Estimert pris</h2>
        <p class="hint">Fyll inn areal for å se estimat.</p>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
